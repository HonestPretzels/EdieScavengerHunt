<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fdfaf3">
  <title>Look Down</title>
  <meta name="description" content="A scavenger hunt clue. The answer is closer than you think.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Handwriting fonts (with a graceful system fallback if these don't load) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #fdfaf3;
      --ink: #2b2b2b;
      --accent: #c0392b;
      --hand: "Patrick Hand", "Comic Sans MS", "Segoe Print", cursive;
      --hand-display: "Caveat", "Patrick Hand", "Comic Sans MS", cursive;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5vw;
      background-color: var(--paper);
      /* faint notebook-paper texture, drawn with CSS so there are no image requests */
      background-image:
        radial-gradient(var(--ink) 0.5px, transparent 0.5px),
        radial-gradient(var(--ink) 0.5px, var(--paper) 0.5px);
      background-size: 28px 28px;
      background-position: 0 0, 14px 14px;
      background-blend-mode: normal;
      color: var(--ink);
      font-family: var(--hand);
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    /* lighten the dot grid so it reads as subtle texture, not loud polka dots */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: var(--paper);
      opacity: 0.92;
      z-index: -1;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 32rem;
      padding: clamp(1.75rem, 6vw, 3rem) clamp(1.5rem, 6vw, 3rem) clamp(2rem, 7vw, 3.25rem);
      text-align: center;
      background: var(--paper);
      /* lopsided radii = hand-drawn "wobbly" rounded box */
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      border: 3px solid var(--ink);
      box-shadow: 6px 7px 0 rgba(43, 43, 43, 0.12);
    }

    .arrow {
      display: block;
      width: clamp(64px, 22vw, 104px);
      height: auto;
      margin: 0 auto clamp(1rem, 4vw, 1.75rem);
      color: var(--accent);
      animation: bob 1.6s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    h1 {
      margin: 0 0 0.6rem;
      font-family: var(--hand-display);
      font-weight: 700;
      line-height: 1.05;
      font-size: clamp(2.2rem, 9vw, 3.4rem);
    }

    /* click-to-reveal hint */
    .hint {
      margin: 0 auto;
      max-width: 24rem;
    }

    .hint > summary {
      list-style: none;            /* hide default triangle (standards) */
      cursor: pointer;
      display: inline-block;
      padding: 0.45em 1.1em;
      font-size: clamp(1.05rem, 4.5vw, 1.35rem);
      color: var(--accent);
      border: 2.5px dashed var(--accent);
      /* wobbly hand-drawn pill */
      border-radius: 130px 16px 120px 16px / 16px 110px 16px 130px;
      transition: transform 0.12s ease;
      user-select: none;
    }

    .hint > summary::-webkit-details-marker { display: none; }  /* hide triangle (WebKit) */

    .hint > summary:hover,
    .hint > summary:focus-visible { transform: rotate(-1.2deg) scale(1.03); }

    .hint[open] > summary { display: none; }   /* swap the prompt out once revealed */

    .lead {
      margin: 0 auto;
      max-width: 22rem;
      font-size: clamp(1.15rem, 5vw, 1.5rem);
      line-height: 1.4;
    }

    /* honour users who prefer no motion */
    @media (prefers-reduced-motion: reduce) {
      .arrow { animation: none; }
    }
  </style>
</head>
<body>
  <main class="card">
    <!-- Hand-drawn upward arrow, pointing toward the address bar. Decorative. -->
    <svg class="arrow" viewBox="0 0 100 130" fill="none" stroke="currentColor"
         stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
         role="img" aria-label="An arrow pointing up">
      <path d="M50 122 C 47 90, 53 55, 50 16" />
      <path d="M24 44 C 35 32, 44 24, 50 13 C 56 24, 65 32, 76 44" />
    </svg>

    <h1>Look above to see your next location</h1>
    <details class="hint">
      <summary>Need a hint?</summary>
      <p class="lead">Look closely at the web address at the top of your screen.</p>
    </details>
  </main>
</body>
</html>
